<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Question Paper Builder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .worksheet-ans { width: 90%; margin-top: 5px; border: 1px solid #ddd; padding: 5px; border-radius: 4px; font-size: 13px; display: block; }
    .lesson-checkbox { transform: scale(1.3); margin-right: 10px; cursor: pointer; }
    .combine-btn { background-color: #6c5ce7; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; display: none; }
    
    /* BULK UPLOAD STYLES */
    .bulk-box { background: #f1f2f6; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 2px dashed #6c5ce7; }
    .bulk-box label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; }
    .bulk-box textarea { width: 100%; height: 100px; border-radius: 5px; border: 1px solid #ccc; padding: 8px; font-size: 13px; margin-bottom: 8px; }
    .bulk-btn { background: #6c5ce7; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    
    .setting-row { display: flex; gap: 5px; margin-bottom: 10px; }
    .setting-row input { width: 33%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

    .step-container { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* --- PRINT SETTINGS START --- */
@media print {
    /* Hide everything on the screen by default */
    body * {
        visibility: hidden;
    }
    
    /* Make only the paper area and its content visible */
    #printArea, #printArea * {
        visibility: visible;
    }
    
    /* Position the paper at the top-left of the printed page */
    #printArea {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        border: none !important;
    }
    
    /* Ensure background is white and remove margins for a clean print */
    body {
        background: white !important;
        margin: 0;
    }
}
/* --- PRINT SETTINGS END --- */
  </style>
</head>
<body class="login-bg">

  <div id="loginBox" class="login-card">
    <h2>Login to Dashboard</h2>
    <input type="text" id="username" placeholder="Enter Username" required>
    <input type="password" id="password" placeholder="Enter Password" required>
    <button onclick="login()">Enter Dashboard</button>
  </div>

  <div id="app" style="display:none;">
    
    <div class="header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h2 id="currentStepTitle">English Medium</h2>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="classStep" class="step-container">
      <div class="grid-container">
        <div class="card" onclick="selectClass('12')"><div class="icon">XII</div><span>Class 12</span></div>
        <div class="card" onclick="selectClass('11')"><div class="icon">XI</div><span>Class 11</span></div>
        <div class="card" onclick="selectClass('10')"><div class="icon">X</div><span>Class 10</span></div>
        <div class="card" onclick="selectClass('9')"><div class="icon">IX</div><span>Class 9</span></div>
        <div class="card" onclick="selectClass('8')"><div class="icon">VIII</div><span>Class 8</span></div>
        <div class="card" onclick="selectClass('7')"><div class="icon">VII</div><span>Class 7</span></div>
        <div class="card" onclick="selectClass('6')"><div class="icon">VI</div><span>Class 6</span></div>
        <div class="card" onclick="selectClass('5')"><div class="icon">V</div><span>Class 5</span></div>
        <div class="card" onclick="selectClass('4')"><div class="icon">IV</div><span>Class 4</span></div>
        <div class="card" onclick="selectClass('3')"><div class="icon">III</div><span>Class 3</span></div>
        <div class="card" onclick="selectClass('2')"><div class="icon">II</div><span>Class 2</span></div>
        <div class="card" onclick="selectClass('1')"><div class="icon">I</div><span>Class 1</span></div>
      </div>
    </div>

    <div id="subjectStep" class="step-container" style="display:none;">
      <div class="list-container" id="subjectList"></div>
    </div>

    <div id="lessonStep" class="step-container" style="display:none;">
      <div class="management-header">
        <h3>Manage Lessons</h3>
        <div class="add-box">
          <input type="text" id="newLessonName" placeholder="New Lesson Name...">
          <button onclick="addLesson()" class="add-btn">+ Add Lesson</button>
        </div>
      </div>
      <div id="lessonList" class="list-container"></div>
      <button id="multiBtn" class="combine-btn" onclick="combineLessons()">Generate Combined Test/Worksheet</button>
    </div>

    <div id="builderStep" class="step-container" style="display:none;">
      <div class="builder-layout">
        <div class="left-panel">
          <h3 id="currentLessonTitle">Questions</h3>
          
          <div class="bulk-box">
            <label>Bulk Paste Questions (Line by line):</label>
            <textarea id="bulkQuestions" placeholder="Q1. What is html?&#10;Q2. Why we use css?"></textarea>
            <button onclick="addBulkQuestions()" class="bulk-btn">⚡ Add All Questions</button>
          </div>

          <textarea id="question" style="height:50px;" placeholder="Or enter single question..."></textarea>
          <button onclick="addQuestion()" class="action-btn">Save Single Question</button>
          <hr>
          <div id="bank"></div>
        </div>
        
        <div class="right-panel">
          <h3>Paper Settings</h3>
          <input type="text" id="paperTitle" placeholder="Exam Name (e.g. Unit Test 1)" style="margin-bottom:8px;">
          
          <div class="setting-row">
            <input type="text" id="paperTime" placeholder="Time (e.g. 1 hr)">
            <input type="text" id="paperMarks" placeholder="Total Marks">
            <input type="text" id="paperDate" placeholder="Date">
          </div>

          <button onclick="generatePaper()" class="gen-btn">Generate Test Paper</button>
          <button onclick="generateWorksheet()" class="gen-btn" style="background:#2ecc71; margin-top:5px;">Generate Worksheet (Q+A)</button>
          <button onclick="printPaper()" class="print-btn">Print / Save PDF</button>
          <button onclick="saveToFirebase()" class="gen-btn" style="background: #4CAF50;">Save Paper</button>
          <div id="paper"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    function addBulkQuestions() {
        let text = document.getElementById("bulkQuestions").value.trim();
        if(!text) { alert("Empty List! Please add some questions."); return; }
        let lines = text.split('\n');
        let count = 0;
        lines.forEach(line => {
            if(line.trim() !== "") {
                questions.push({ q: line.trim(), a: "", img: "" });
                count++;
            }
        });
        if(currentLessonIndex !== "MULTI") { saveQuestionsToStorage(); }
        document.getElementById("bulkQuestions").value = "";
        display();
        alert(count + " Success!");
    }
  </script>
</body>
</html>
